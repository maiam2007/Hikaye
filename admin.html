<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hikaye - لوحة التحكم</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>
<style>
  body {
    font-family: 'Tahoma', sans-serif;
    background: #f8f4ee;
    color: #333;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 30px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  h1 {
    text-align: center;
    color: #6b2737;
    margin-bottom: 25px;
  }
  label {
    display: block;
    margin: 15px 0 6px;
    font-weight: bold;
  }
  input[type="text"], input[type="number"], input[type="password"] {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
  }
  input[type="file"] {
    width: 100%;
  }
  button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #6b2737;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }
  button.secondary {
    background: #ccc;
    color: #333;
  }
  button:disabled {
    background: #ccc;
  }
  #status {
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
  }
  .pair {
    border: 1px solid #eee;
    border-radius: 10px;
    padding: 15px;
    margin-top: 15px;
    position: relative;
  }
  .pair .removeBtn {
    width: auto;
    margin-top: 10px;
    background: #eee;
    color: #900;
    font-size: 13px;
    padding: 6px 10px;
  }
  .pairTitle {
    font-weight: bold;
    color: #6b2737;
    margin-bottom: 5px;
  }
</style>
</head>
<body>

<div class="card" id="mainPanel">
  <h1>Hikaye - إضافة فوتوبوك</h1>

  <label>رقم الفوتوبوك</label>
  <input type="number" id="bookNumber" placeholder="مثال: 66" />

  <div id="pairsContainer"></div>

  <button type="button" class="secondary" id="addPairBtn">+ إضافة صورة وفيديو ثانية</button>

  <label>كلمة السر</label>
  <input type="password" id="pwd" placeholder="كلمة سر الرفع" />

  <button id="submitBtn" onclick="addPhotobook()">رفع كل الصور والفيديوهات</button>

  <div id="status"></div>
</div>

<script>
  const SUPABASE_URL = "https://ptzuauxjftwfsyjohogi.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0enVhdXhqZnR3ZnN5am9ob2dpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NzMwNDgsImV4cCI6MjA5OTU0OTA0OH0.EUs3CP7zGQBj78XWRmLE97hntLKZZw7AzmUSpLTeiN4";

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let pairCount = 0;

  function addPairRow() {
    pairCount++;
    const id = pairCount;
    const container = document.getElementById('pairsContainer');
    const div = document.createElement('div');
    div.className = 'pair';
    div.id = 'pair-' + id;
    div.innerHTML = `
      <div class="pairTitle">صورة وفيديو رقم ${id}</div>
      <label>الصورة</label>
      <input type="file" class="imageFile" accept="image/*" />
      <label>الفيديو</label>
      <input type="file" class="videoFile" accept="video/*" />
      ${id > 1 ? `<button type="button" class="removeBtn" onclick="removePair(${id})">حذف هذي الصورة</button>` : ''}
    `;
    container.appendChild(div);
  }

  function removePair(id) {
    const el = document.getElementById('pair-' + id);
    if (el) el.remove();
  }

  document.getElementById('addPairBtn').addEventListener('click', addPairRow);
  addPairRow();

  async function getNextTargetIndex(bookNumber) {
    const { data, error } = await supabaseClient
      .from('photobooks')
      .select('target_index')
      .eq('book_number', bookNumber)
      .order('target_index', { ascending: false })
      .limit(1);

    if (error || !data || data.length === 0 || data[0].target_index === null) {
      return 0;
    }
    return data[0].target_index + 1;
  }

  async function loadImage(url) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = url;
    });
  }

  async function compileAndUploadTargets(bookNumber, password, statusEl) {
    statusEl.style.color = '#333';
    statusEl.textContent = '🧩 جاري تجهيز ملف التعرف على الصور...';

    const { data: rows, error } = await supabaseClient
      .from('photobooks')
      .select('image_url, target_index')
      .eq('book_number', bookNumber)
      .order('target_index', { ascending: true });

    if (error || !rows || rows.length === 0) {
      statusEl.style.color = 'red';
      statusEl.textContent = '❌ ما قدرت أجيب صور الفوتوبوك لتجهيز ملف التعرف';
      return;
    }

    const images = [];
    for (const row of rows) {
      const img = await loadImage(row.image_url);
      images.push(img);
    }

    if (!window.MINDAR || !window.MINDAR.IMAGE) {
      statusEl.style.color = 'red';
      statusEl.textContent = '❌ مكتبة MindAR ما انحملت صح بالمتصفح';
      return;
    }

    const CompilerClass = window.MINDAR.IMAGE.OfflineCompiler || window.MINDAR.IMAGE.Compiler;
    const compiler = new CompilerClass();

    await compiler.compileImageTargets(images, (progress) => {
      statusEl.textContent = `🧩 جاري التجهيز... ${Math.round(progress)}%`;
    });

    const buffer = await compiler.exportData();
    const blob = new Blob([buffer], { type: 'application/octet-stream' });

    const formData = new FormData();
    formData.append('password', password);
    formData.append('bookNumber', bookNumber);
    formData.append('mindFile', blob, `${bookNumber}.mind`);

    const response = await fetch(
      'https://ptzuauxjftwfsyjohogi.supabase.co/functions/v1/upload-targets',
      {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
          'apikey': SUPABASE_ANON_KEY,
        },
        body: formData,
      }
    );

    const result = await response.json();
    if (!response.ok) {
      statusEl.style.color = 'red';
      statusEl.textContent = '❌ خطأ برفع ملف التعرف: ' + (result.error || '');
      return;
    }

    statusEl.style.color = 'green';
    statusEl.textContent = `✅ تم رفع كل شي بنجاح للفوتوبوك رقم ${bookNumber} (بما فيه ملف التعرف على الصور)`;
  }

  async function addPhotobook() {
    const bookNumber = document.getElementById('bookNumber').value;
    const password = document.getElementById('pwd').value;
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    const pairDivs = document.querySelectorAll('.pair');
    const pairs = [];
    for (const div of pairDivs) {
      const imageFile = div.querySelector('.imageFile').files[0];
      const videoFile = div.querySelector('.videoFile').files[0];
      if (imageFile && videoFile) {
        pairs.push({ imageFile, videoFile });
      }
    }

    if (!bookNumber || !password || pairs.length === 0) {
      statusEl.style.color = 'red';
      statusEl.textContent = '⚠️ عبي رقم الفوتوبوك وكلمة السر وصورة+فيديو وحدة على الأقل';
      return;
    }

    submitBtn.disabled = true;
    statusEl.style.color = '#333';

    let nextIndex = await getNextTargetIndex(bookNumber);
    let successCount = 0;

    for (let i = 0; i < pairs.length; i++) {
      statusEl.textContent = `جاري رفع الصورة ${i + 1} من ${pairs.length}...`;

      try {
        const formData = new FormData();
        formData.append('password', password);
        formData.append('bookNumber', bookNumber);
        formData.append('targetIndex', nextIndex);
        formData.append('imageFile', pairs[i].imageFile);
        formData.append('videoFile', pairs[i].videoFile);

        const response = await fetch(
          'https://ptzuauxjftwfsyjohogi.supabase.co/functions/v1/add-photobook',
          {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
              'apikey': SUPABASE_ANON_KEY,
            },
            body: formData,
          }
        );

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || 'صار خطأ غير متوقع');
        }

        successCount++;
        nextIndex++;

      } catch (err) {
        statusEl.style.color = 'red';
        statusEl.textContent = `❌ صار خطأ بالصورة ${i + 1}: ${err.message}`;
        submitBtn.disabled = false;
        return;
      }
    }

    try {
      await compileAndUploadTargets(bookNumber, password, statusEl);
    } catch (err) {
      statusEl.style.color = 'red';
      statusEl.textContent = '❌ خطأ بتجهيز ملف التعرف: ' + err.message;
    }

    document.getElementById('bookNumber').value = '';
    document.getElementById('pwd').value = '';
    document.getElementById('pairsContainer').innerHTML = '';
    pairCount = 0;
    addPairRow();

    submitBtn.disabled = false;
  }
</script>

</body>
</html>
