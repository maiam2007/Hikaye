<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hikaye - لوحة التحكم</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body {
    font-family: 'Tahoma', sans-serif;
    background: #f8f4ee;
    color: #333;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 30px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  h1 {
    text-align: center;
    color: #6b2737;
    margin-bottom: 25px;
  }
  label {
    display: block;
    margin: 15px 0 6px;
    font-weight: bold;
  }
  input[type="text"], input[type="number"], input[type="password"] {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
  }
  input[type="file"] {
    width: 100%;
  }
  button {
    width: 100%;
    margin-top: 25px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #6b2737;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }
  button:disabled {
    background: #ccc;
  }
  #status {
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
  }
  #lockScreen {
    text-align: center;
  }
</style>
</head>
<body>

<div class="card" id="lockScreen">
  <h1>Hikaye</h1>
  <label>كلمة السر</label>
  <input type="password" id="pwd" />
  <button onclick="checkPassword()">دخول</button>
</div>

<div class="card" id="mainPanel" style="display:none;">
  <h1>Hikaye - إضافة فوتوبوك</h1>

  <label>رقم الفوتوبوك</label>
  <input type="number" id="bookNumber" placeholder="مثال: 66" />

  <label>الصورة</label>
  <input type="file" id="imageFile" accept="image/*" />

  <label>الفيديو</label>
  <input type="file" id="videoFile" accept="video/*" />

  <button id="submitBtn" onclick="addPhotobook()">رفع</button>

  <div id="status"></div>
</div>

<script>
  const ADMIN_PASSWORD = "mamarm2007";

  function checkPassword() {
    const entered = document.getElementById('pwd').value;
    if (entered === ADMIN_PASSWORD) {
      document.getElementById('lockScreen').style.display = 'none';
      document.getElementById('mainPanel').style.display = 'block';
    } else {
      alert('كلمة السر غلط');
    }
  }

  const SUPABASE_URL = "https://ptzuauxjftwfsyjohogi.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0enVhdXhqZnR3ZnN5am9ob2dpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NzMwNDgsImV4cCI6MjA5OTU0OTA0OH0.EUs3CP7zGQBj78XWRmLE97hntLKZZw7AzmUSpLTeiN4";

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function randomCode(length = 8) {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    let result = '';
    for (let i = 0; i < length; i++) {
      result += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return result;
  }

  async function addPhotobook() {
    const bookNumber = document.getElementById('bookNumber').value;
    const imageFile = document.getElementById('imageFile').files[0];
    const videoFile = document.getElementById('videoFile').files[0];
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    if (!bookNumber || !imageFile || !videoFile) {
      statusEl.textContent = '⚠️ عبي كل الحقول';
      statusEl.style.color = 'red';
      return;
    }

    submitBtn.disabled = true;
    statusEl.style.color = '#333';
    statusEl.textContent = 'جاري الرفع...';

    try {
      const formData = new FormData();
      formData.append('password', document.getElementById('pwd').value);
      formData.append('bookNumber', bookNumber);
      formData.append('imageFile', imageFile);
      formData.append('videoFile', videoFile);

      const response = await fetch(
        'https://ptzuauxjftwfsyjohogi.supabase.co/functions/v1/add-photobook',
        {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
            'apikey': SUPABASE_ANON_KEY,
          },
          body: formData,
        }
      );

      const result = await response.json();

      if (!response.ok) {
        throw new Error(result.error || 'صار خطأ غير متوقع');
      }

      statusEl.style.color = 'green';
      statusEl.textContent = '✅ تم الرفع بنجاح! كود الصورة: ' + result.imageCode;
      document.getElementById('bookNumber').value = '';
      document.getElementById('imageFile').value = '';
      document.getElementById('videoFile').value = '';

    } catch (err) {
      statusEl.style.color = 'red';
      statusEl.textContent = '❌ صار خطأ: ' + err.message;
    } finally {
      submitBtn.disabled = false;
    }
  }
</script>
</body>
</html>
