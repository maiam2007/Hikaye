<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #videoOverlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #111;
      z-index: 999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    #myVideo {
      max-width: 100%;
      max-height: 85vh;
    }
    #playBtn {
      position: absolute;
      width: 70px; height: 70px;
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
      border: none;
      font-size: 28px;
      color: #333;
    }
  </style>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
  <a-scene mindar-image="imageTargetSrc: targets.mind;"
    color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity id="target" mindar-image-target="targetIndex: 0"></a-entity>
  </a-scene>

  <div id="videoOverlay">
    <video id="myVideo" src="https://ptzuauxjftwfsyjohogi.supabase.co/storage/v1/object/public/Videossss/MVI_5284.mp4" playsinline webkit-playsinline></video>
    <button id="playBtn">▶</button>
  </div>

  <script>
    const sceneEl = document.querySelector('a-scene');
    const overlay = document.querySelector('#videoOverlay');
    const video = document.querySelector('#myVideo');
    const playBtn = document.querySelector('#playBtn');

    sceneEl.addEventListener('renderstart', () => {
      const target = document.querySelector('#target');
      target.addEventListener('targetFound', () => {
        sceneEl.style.display = 'none';
        overlay.style.display = 'flex';
      });
    });

    playBtn.addEventListener('click', () => {
      video.play();
      playBtn.style.display = 'none';
    });

    video.addEventListener('ended', () => {
      playBtn.style.display = 'block';
    });
  </script>
</body>
</html>
