<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
body { margin: 0; overflow: hidden; background: #000; }
#videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 999; justify-content: center; align-items: center; flex-direction: column; }
#myVideo { max-width: 100%; max-height: 85vh; }
#playBtn { position: absolute; width: 70px; height: 70px; background: rgba(255,255,255,0.9); border-radius: 50%; border: none; font-size: 28px; color: #333; }
#errorMsg, #loadingMsg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; display: none; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box; font-family: Tahoma, sans-serif; color: #6b2737; font-size: 18px; direction: rtl; }
#loadingMsg { display: flex; }
</style>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="loadingMsg">جاري التحميل...</div>
<div id="arContainer"></div>

<div id="videoOverlay">
<video id="myVideo" playsinline webkit-playsinline controls></video>
<button id="playBtn">▶</button>
</div>
<div id="errorMsg">هذا الفوتوبوك مو موجود</div>

<script>
  const SUPABASE_URL = "https://ptzuauxjftwfsyjohogi.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0enVhdXhqZnR3ZnN5am9ob2dpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NzMwNDgsImV4cCI6MjA5OTU0OTA0OH0.EUs3CP7zGQBj78XWRmLE97hntLKZZw7AzmUSpLTeiN4";
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const loadingMsg = document.querySelector('#loadingMsg');
  const arContainer = document.querySelector('#arContainer');
  const overlay = document.querySelector('#videoOverlay');
  const video = document.querySelector('#myVideo');
  const playBtn = document.querySelector('#playBtn');
  const errorMsg = document.querySelector('#errorMsg');

  let videoMap = {};

  async function loadSceneFromBook() {
    const params = new URLSearchParams(window.location.search);
    const bookNumber = params.get('book');
    const key = params.get('key');

    if (!bookNumber || !key) {
      loadingMsg.style.display = 'none';
      errorMsg.textContent = 'رابط غير صحيح';
      errorMsg.style.display = 'flex';
      return;
    }

    const { data, error } = await supabaseClient
      .from('photobooks')
      .select('target_index, video_url, secret_key')
      .eq('book_number', bookNumber);

    if (error || !data || data.length === 0) {
      loadingMsg.style.display = 'none';
      errorMsg.textContent = 'هذا الفوتوبوك مو موجود';
      errorMsg.style.display = 'flex';
      return;
    }

    // التحقق من الكود السري قبل عرض أي شي
    if (data[0].secret_key !== key) {
      loadingMsg.style.display = 'none';
      errorMsg.textContent = 'رابط غير صحيح';
      errorMsg.style.display = 'flex';
      return;
    }

    data.forEach(row => {
      videoMap[row.target_index] = row.video_url;
    });

    const mindFileUrl = `${SUPABASE_URL}/storage/v1/object/public/targets/${bookNumber}.mind`;

    const targetEntities = data.map(row =>
      `<a-entity class="target" data-index="${row.target_index}" mindar-image-target="targetIndex: ${row.target_index}"></a-entity>`
    ).join('');

    arContainer.innerHTML = `
      <a-scene mindar-image="imageTargetSrc: ${mindFileUrl};" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        ${targetEntities}
      </a-scene>
    `;

    const sceneEl = arContainer.querySelector('a-scene');
    loadingMsg.style.display = 'none';

    sceneEl.addEventListener('renderstart', function() {
      const targets = arContainer.querySelectorAll('.target');
      targets.forEach(target => {
        target.addEventListener('targetFound', function() {
          const idx = target.getAttribute('data-index');
          const url = videoMap[idx];
          if (!url) return;
          video.src = url;
          sceneEl.style.display = 'none';
          overlay.style.display = 'flex';
        });
      });
    });
  }

  loadSceneFromBook();

  playBtn.addEventListener('click', function() {
    video.play();
    playBtn.style.display = 'none';
  });
</script>

</body>
</html>
