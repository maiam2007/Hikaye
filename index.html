<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
  <a-scene mindar-image="imageTargetSrc: targets.mind;"
    color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    <a-assets>
      <video id="myVideo" src="MVI_5285.mp4" preload="auto" loop="true" muted="true" webkit-playsinline playsinline crossorigin="anonymous"></video>
    </a-assets>
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity mindar-image-target="targetIndex: 0">
      <a-video src="#myVideo" width="1" height="0.552" position="0 0 0" rotation="0 0 0"></a-video>
    </a-entity>
  </a-scene>
  <script>
    const sceneEl = document.querySelector('a-scene');
    sceneEl.addEventListener('renderstart', () => {
      const target = document.querySelector('[mindar-image-target]');
      const video = document.querySelector('#myVideo');
      target.addEventListener('targetFound', () => { video.play(); });
      target.addEventListener('targetLost', () => { video.pause(); });
    });
  </script>
</body>
</html>
