<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hikaye</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    font-family: 'IBM Plex Sans Arabic', Tahoma, sans-serif;
    background: linear-gradient(
      to bottom,
      #8B0058 0%,
      #8B0058 30%,
      #b3568f 36%,
      #ddb3cd 41%,
      #fdf8f0 41%,
      #fdf8f0 100%
    );
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 60px 20px 40px;
    text-align: center;
    overflow: hidden;
  }

  /* زر تبديل اللغة */
  .langToggle {
    position: fixed;
    top: 20px;
    inset-inline-end: 20px;
    display: flex;
    background: rgba(255,255,255,0.15);
    border-radius: 999px;
    padding: 4px;
    z-index: 10;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards;
    animation-delay: 1.6s;
  }
  .langToggle button {
    border: none;
    background: transparent;
    padding: 6px 16px;
    border-radius: 999px;
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    font-size: 13px;
    cursor: pointer;
    color: #fdf8f0;
  }
  .langToggle button.active {
    background: #fdf8f0;
    color: #8B0058;
    font-weight: 600;
  }

  .logo {
    width: 250px;
    height: 250px;
    object-fit: contain;
   margin-top: -15px
    opacity: 0;
    animation: riseIn 0.7s ease forwards;
    animation-delay: 0.2s;
  }

  .wordmark {
    width: 280px;
    margin-top: 8px;
    object-fit: contain;
    mix-blend-mode: multiply;
    opacity: 0;
    animation: riseIn 0.7s ease forwards;
    animation-delay: 0.9s;
  }

  .divider {
    width: 90px;
    height: 2px;
    margin: 10px 0;
    background: linear-gradient(to left, transparent, #d4af6a, transparent);
    opacity: 0;
    animation: fadeIn 0.6s ease forwards;
    animation-delay: 1.5s;
  }

  .tagline {
    font-size: 17px;
    color: #5c1f2e;
    font-weight: 500;
    opacity: 0;
    animation: fadeIn 0.7s ease forwards;
    animation-delay: 1.9s;
  }
  .tagline[lang="en"] {
    font-family: 'Cormorant Garamond', serif;
    display: none;
  }

  .startBtn {
    margin-top: 18px;
    padding: 14px 46px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(135deg, #8B0058, #5c1f2e);
    color: #fdf8f0;
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    font-size: 16px;
    font-weight: 600;
    text-decoration: none;
    display: inline-block;
    box-shadow: 0 6px 18px rgba(92,31,46,0.35);
    opacity: 0;
    animation: fadeIn 0.7s ease forwards;
    animation-delay: 2.3s;
  }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
</head>
<body>

<div class="langToggle">
  <button id="btnAr" class="active" onclick="setLang('ar')">عربي</button>
  <button id="btnEn" onclick="setLang('en')">EN</button>
</div>

<img class="logo" src="logo.png" alt="Hikaye logo" />
<img class="wordmark" src="wordmark.png" alt="حكاية" />

<div class="divider"></div>

<div class="tagline" lang="ar">وجّه الكاميرا... عيشها من جديد</div>
<div class="tagline" lang="en">Point your camera... relive it</div>

<a class="startBtn" id="startBtn" href="index.html">
  <span lang="ar">ابدأ المسح</span>
</a>

<script>
  function setLang(lang) {
    document.getElementById('btnAr').classList.toggle('active', lang === 'ar');
    document.getElementById('btnEn').classList.toggle('active', lang === 'en');

    document.querySelectorAll('.tagline').forEach(el => {
      el.style.display = (el.getAttribute('lang') === lang) ? 'block' : 'none';
    });

    document.querySelector('#startBtn span').textContent =
      lang === 'ar' ? 'ابدأ المسح' : 'Start Scanning';
  }

  window.addEventListener('DOMContentLoaded', () => {
    const params = window.location.search;
    if (params) {
      document.getElementById('startBtn').href = 'index.html' + params;
    }
  });
</script>

</body>
</html>
